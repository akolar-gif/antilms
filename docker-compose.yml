services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATA_FILE_PATH=/app/data/data.json
      - UPLOAD_DIR=/app/data/uploads
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
