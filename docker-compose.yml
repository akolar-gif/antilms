services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATA_FILE_PATH=/app/data/data.json
      - UPLOAD_DIR=/app/data/uploads
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    expose:
      - "3000"
    extra_hosts:
      - "pg-ca61895e1212a85b.postgresql.de-fra.ionoscloud.com:192.168.19.12"

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./data/uploads:/var/www/uploads
    depends_on:
      - web

  migration:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment:
      - DATABASE_URL=${DATABASE_URL}
    env_file:
      - .env
    command: npm run migrate
    extra_hosts:
      - "pg-ca61895e1212a85b.postgresql.de-fra.ionoscloud.com:192.168.19.12"

volumes:
  caddy_data:
  caddy_config:
